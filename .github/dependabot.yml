version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      # eslint-plugin-vue does not yet support ESLint 10 (forces ESLint < 10);
      # ESLint 10 removed context.getSourceCode(), breaking vue/* rules.
      # Track vuejs/eslint-plugin-vue#3017; lift this once the plugin ships v10 support.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
  - package-ecosystem: cargo
    directory: /exercises/rust
    schedule:
      interval: monthly
  - package-ecosystem: gomod
    directory: /exercises/go
    schedule:
      interval: monthly
  - package-ecosystem: pip
    directory: /exercises/python
    schedule:
      interval: monthly
